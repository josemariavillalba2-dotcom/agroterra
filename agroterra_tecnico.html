<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AT Horas">
<meta name="theme-color" content="#0d1410">
<link rel="manifest" href="manifest_tecnico.json">
<link rel="apple-touch-icon" href="icon_tecnico.png">
<title>Agroterra · Técnicos</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1410;--bg2:#141e18;--surface:#1a2a1e;--surface2:#223028;--surface3:#2a3a30;
  --border:rgba(168,224,64,0.12);--border2:rgba(168,224,64,0.25);--border3:rgba(168,224,64,0.45);
  --green:#a8e040;--green2:#90cc30;--green-dim:rgba(168,224,64,0.10);--green-dim2:rgba(168,224,64,0.18);
  --cyan:#60E8B0;--cyan-dim:rgba(96,232,176,0.12);
  --amber:#FFB020;--amber-dim:rgba(255,176,32,0.12);
  --red:#FF5555;--red-dim:rgba(255,85,85,0.10);
  --blue:#60C8FF;--purple:#C090FF;
  --text:#E8F4E0;--text2:#6A8A60;--text3:#3A5030;
  --r:14px;--r2:10px;--r3:7px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;-webkit-text-size-adjust:100%}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;position:relative}
/* SCREENS */
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}
/* LOGIN */
#scr-login{align-items:center;justify-content:center;padding:32px 24px;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(168,224,64,0.08),transparent 70%),var(--bg)}
.login-card{width:100%;max-width:340px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:32px 28px}
.login-logo{display:block;width:160px;height:auto;margin:0 auto 20px;filter:brightness(0) invert(1)}
.login-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;text-align:center;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--text2);text-align:center;margin-bottom:24px}
.lf{margin-bottom:16px}
.lf label{display:block;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:7px}
.lf select,.lf input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:13px 14px;color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;outline:none;-webkit-appearance:none;transition:border-color 0.2s}
.lf select:focus,.lf input:focus{border-color:var(--green2)}
.lf select option{background:#141e18}
.pin-row{display:flex;gap:10px;margin-bottom:16px}
.pin-digit{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:14px 0;font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;text-align:center;color:var(--green);letter-spacing:4px;min-height:56px;display:flex;align-items:center;justify-content:center}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.pin-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--text);text-align:center;cursor:pointer;transition:all 0.1s;-webkit-tap-highlight-color:transparent;user-select:none}
.pin-btn:active{background:var(--surface3);transform:scale(0.95)}
.pin-btn.del{color:var(--amber)}
.pin-btn.enter{background:var(--green-dim2);border-color:var(--border2);color:var(--green)}
.btn-login{width:100%;background:var(--green);color:var(--bg);border:none;border-radius:var(--r2);padding:14px;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:all 0.15s}
.btn-login:active{transform:scale(0.98)}
.login-err{color:var(--red);font-size:13px;margin-top:10px;min-height:18px;text-align:center}
/* MAIN APP */
#scr-app{flex-direction:column}
.top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.top-bar-left{display:flex;flex-direction:column;gap:2px}
.tb-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--text)}
.tb-date{font-size:11px;color:var(--text2)}
.tb-status{font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn-logout{background:none;border:1px solid var(--border);border-radius:var(--r3);padding:7px 12px;color:var(--text2);font-family:'Barlow',sans-serif;font-size:12px;cursor:pointer}
/* TABS */
.tabs-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 4px}
.tab-btn{flex:1;padding:12px 4px 10px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-align:center;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.5px;-webkit-tap-highlight-color:transparent}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green)}
.tab-content{display:none;flex:1;overflow-y:auto;padding-bottom:calc(20px + var(--safe-bottom))}
.tab-content.active{display:block}
/* JORNADA */
.jornada-header{padding:16px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.jh-date{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800}
.jh-status{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700}
.status-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.sb-draft{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(255,176,32,0.3)}
.sb-sent{background:var(--green-dim2);color:var(--green);border:1px solid var(--border2)}
/* DAY NAV */
.day-nav{display:flex;align-items:center;gap:8px;padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border)}
.day-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r3);padding:6px 12px;color:var(--text);font-size:14px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;-webkit-tap-highlight-color:transparent}
.day-btn:active{background:var(--surface3)}
.day-label{flex:1;text-align:center;font-size:12px;color:var(--text2);font-weight:600}
/* ITEMS */
.items-list{padding:0}
.item-card{padding:14px 20px;border-bottom:1px solid var(--border);transition:background 0.15s}
.item-card:active{background:var(--surface2)}
.item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
.item-ot{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;color:var(--text)}
.item-tipo{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
.tag-prod{background:rgba(168,224,64,0.12);color:var(--green);border:1px solid rgba(168,224,64,0.25)}
.tag-improd{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(255,176,32,0.2)}
.tag-cap{background:rgba(96,200,255,0.1);color:var(--blue);border:1px solid rgba(96,200,255,0.2)}
.tag-viaje{background:rgba(192,144,255,0.1);color:var(--purple);border:1px solid rgba(192,144,255,0.2)}
.tag-refrig{background:rgba(255,144,96,0.1);color:#FF9060;border:1px solid rgba(255,144,96,0.2)}
.item-hours{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;color:var(--green);flex-shrink:0}
.item-meta{font-size:11px;color:var(--text2)}
.item-extra-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700;background:var(--amber-dim);color:var(--amber);border:1px solid rgba(255,176,32,0.3);margin-left:4px}
.btn-del-item{background:none;border:1px solid var(--border);border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--text3);cursor:pointer;font-size:12px;flex-shrink:0}
.items-empty{padding:40px 20px;text-align:center;color:var(--text3);font-size:13px}
/* TOTALES */
.totales-bar{background:var(--surface);border-top:1px solid var(--border2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;gap:20px}
.tot-item{display:flex;flex-direction:column;gap:2px}
.tot-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;line-height:1}
.tot-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
/* AGREGAR ITEM */
.add-item-section{padding:16px 20px;background:var(--bg2);border-bottom:1px solid var(--border)}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;margin-bottom:14px;color:var(--green);text-transform:uppercase;letter-spacing:0.5px}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px}
.field select,.field input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:11px 13px;color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;outline:none;-webkit-appearance:none;transition:border-color 0.2s}
.field select:focus,.field input:focus{border-color:var(--green2)}
.field select option{background:#1a2a1e}
.time-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:6px 10px}
.time-col{display:flex;flex-direction:column;align-items:center;gap:2px}
.time-lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.time-sel{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:10px 8px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;text-align:center;outline:none;-webkit-appearance:none;cursor:pointer}
.time-sep{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--text3)}
.hours-preview{margin-top:8px;text-align:center;background:var(--green-dim2);border:1px solid var(--border2);border-radius:6px;padding:8px;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--green)}
.motivo-field{display:none}
.btn-add-item{width:100%;background:var(--green);color:var(--bg);border:none;border-radius:var(--r3);padding:14px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;transition:all 0.15s;margin-top:4px}
.btn-add-item:active{transform:scale(0.98)}
.btn-add-item:disabled{background:var(--text3);cursor:not-allowed;transform:none}
.add-err{color:var(--red);font-size:12px;margin-top:8px;min-height:16px;text-align:center}
/* ENVIAR */
.send-section{padding:20px}
.btn-send{width:100%;background:var(--green);color:var(--bg);border:none;border-radius:var(--r2);padding:16px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-send:active{transform:scale(0.98)}
.btn-send:disabled{background:var(--text3);cursor:not-allowed}
.btn-send-secondary{width:100%;background:none;border:1px solid var(--border2);border-radius:var(--r2);padding:13px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--green);cursor:pointer;margin-top:10px;transition:all 0.15s}
.btn-send-secondary:active{background:var(--green-dim2)}
/* HISTORIAL */
.hist-day{border-bottom:1px solid var(--border)}
.hist-day-header{padding:10px 20px;background:var(--surface);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:space-between}
.hist-day-total{font-size:13px;color:var(--green)}
.hist-item{padding:10px 20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px}
.hist-ot{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;flex:1}
.hist-h{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--green)}
/* OTs TAB */
.ot-list-item{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px}
.ot-list-num{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:900;min-width:100px}
.ot-list-info{flex:1;min-width:0}
.ot-list-desc{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.ot-list-client{font-size:11px;color:var(--text3)}
.ot-tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
.ot-active{background:rgba(168,224,64,0.12);color:var(--green);border:1px solid rgba(168,224,64,0.25)}
.ot-closed{background:rgba(255,85,85,0.1);color:var(--red);border:1px solid rgba(255,85,85,0.2)}
/* TOAST */
.toast{position:fixed;bottom:calc(28px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:11px 22px;border-radius:30px;font-size:13px;font-weight:600;opacity:0;transition:all 0.25s;z-index:999;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--green-dim2);border-color:var(--border2);color:var(--green)}
.toast.error{background:var(--red-dim);border-color:rgba(255,85,85,0.3);color:var(--red)}
/* SPINNER */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(13,20,16,0.3);border-top-color:#0d1410;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="scr-login" class="screen active">
  <div class="login-card">
    <img src="https://josemariavillalba2-dotcom.github.io/agroterra/LOGO_AGROTERRA_S_A__-_SIN_FONDO.png" alt="Agroterra" class="login-logo"/>
    <div class="login-title">Registro de Horas</div>
    <div class="login-sub">Seleccioná tu nombre e ingresá tu PIN</div>
    <div class="lf">
      <label>Técnico</label>
      <select id="sel-tech">
        <option value="">— Seleccioná tu nombre —</option>
      </select>
    </div>
    <div class="lf">
      <label>PIN</label>
      <div class="pin-row"><div class="pin-digit" id="pin-display">—</div></div>
      <div class="pin-pad" id="pin-pad"></div>
    </div>
    <button class="btn-login" id="btn-ingresar" onclick="doLogin()">Ingresar →</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="scr-app" class="screen">
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="tb-name" id="tb-name">—</div>
      <div class="tb-date" id="tb-date">—</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
      <div class="tb-status"><div class="status-dot"></div><span id="tb-sync">En línea</span></div>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="tabs-bar">
    <button class="tab-btn active" id="tab-jornada" onclick="goTab('jornada')">Jornada</button>
    <button class="tab-btn" id="tab-historial" onclick="goTab('historial')">Historial</button>
    <button class="tab-btn" id="tab-ordenes" onclick="goTab('ordenes')">Mis OTs</button>
  </div>

  <!-- TAB JORNADA -->
  <div class="tab-content active" id="tc-jornada">
    <div class="day-nav">
      <button class="day-btn" onclick="navDay(-1)">‹ Ayer</button>
      <div class="day-label" id="day-label">—</div>
      <button class="day-btn" id="btn-manana" onclick="navDay(1)">Mañana ›</button>
    </div>

    <div class="jornada-header">
      <div>
        <div class="jh-date" id="jh-date">—</div>
        <div id="jh-detail" style="font-size:11px;color:var(--text2)">—</div>
      </div>
      <div id="jh-status"></div>
    </div>

    <div class="totales-bar" id="totales-bar">
      <div class="tot-item"><div class="tot-val" id="tot-regular" style="color:var(--green)">0h</div><div class="tot-label">Regular</div></div>
      <div class="tot-item"><div class="tot-val" id="tot-extra" style="color:var(--amber)">0h</div><div class="tot-label">Extra</div></div>
      <div class="tot-item"><div class="tot-val" id="tot-total" style="color:var(--text)">0h</div><div class="tot-label">Total</div></div>
    </div>

    <div class="items-list" id="items-list"></div>

    <!-- AGREGAR ITEM -->
    <div class="add-item-section" id="add-item-section">
      <div class="section-title">+ Agregar bloque de horas</div>

      <div class="field">
        <label>Orden de Trabajo</label>
        <select id="sel-ot" onchange="onOTChange()">
          <option value="">— Seleccioná OT —</option>
        </select>
      </div>

      <div class="field">
        <label>Tipo de hora</label>
        <select id="sel-tipo" onchange="onTipoChange()">
          <option value="Productiva">Productiva</option>
          <option value="Improductiva">Improductiva</option>
          <option value="Capacitación">Capacitación</option>
          <option value="Viaje">Viaje</option>
          <option value="Refrigerio">Refrigerio</option>
        </select>
      </div>

      <div class="field motivo-field" id="motivo-field">
        <label>Motivo improductividad</label>
        <select id="sel-motivo">
          <option value="Espera de repuesto">⏳ Espera de repuesto</option>
          <option value="Espera de autorización">📋 Espera de autorización</option>
          <option value="Sin trabajo asignado">💤 Sin trabajo asignado</option>
          <option value="Falla de herramienta/equipo">🔧 Falla de herramienta/equipo</option>
          <option value="Reunión interna">🗣 Reunión interna</option>
          <option value="Otros">📝 Otros</option>
        </select>
      </div>

      <div class="field">
        <label>Horario</label>
        <div class="time-row">
          <div class="time-col">
            <div class="time-lbl">Desde</div>
            <select class="time-sel" id="sel-desde" onchange="recalcHours()"></select>
          </div>
          <div class="time-sep">→</div>
          <div class="time-col">
            <div class="time-lbl">Hasta</div>
            <select class="time-sel" id="sel-hasta" onchange="recalcHours()"></select>
          </div>
        </div>
        <div class="hours-preview" id="hours-preview" style="display:none"></div>
      </div>

      <div class="field">
        <label>Observaciones (opcional)</label>
        <input type="text" id="inp-obs" placeholder="Notas del trabajo..."/>
      </div>

      <button class="btn-add-item" id="btn-add-item" onclick="addItem()">Agregar bloque</button>
      <div class="add-err" id="add-err"></div>
    </div>

    <!-- ENVIAR -->
    <div class="send-section" id="send-section">
      <button class="btn-send" id="btn-send" onclick="sendJornada()">
        <span id="btn-send-txt">📤 Enviar jornada</span>
      </button>
      <button class="btn-send-secondary" onclick="saveDraft()">💾 Guardar borrador</button>
    </div>
  </div>

  <!-- TAB HISTORIAL -->
  <div class="tab-content" id="tc-historial">
    <div id="hist-container" style="padding-bottom:20px"></div>
  </div>

  <!-- TAB OTs -->
  <div class="tab-content" id="tc-ordenes">
    <div style="padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border)">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:var(--green)">ÓRDENES DE TRABAJO DISPONIBLES</div>
      <div style="font-size:11px;color:var(--text2);margin-top:2px">Actualizadas desde el servidor</div>
    </div>
    <div id="ot-tab-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const API = 'https://script.google.com/macros/s/AKfycbwGiT4ZMPpumGbMmWz0tynvjYeE4R77Fz1VjNQmff7JS4UidL3BQ5fRbrBMoiCvfRo4/exec';
const DB_KEY = 'agroterra_tec_v2';
const DRAFT_KEY = 'agroterra_drafts_v2';

let currentTech = null;
let currentDateOffset = 0; // 0 = hoy, -1 = ayer
const JORNADA_START = '07:00', JORNADA_END = '19:30', REGULAR_LIMIT = '17:00';

// ═══════════════════════════════════════════
// DB
// ═══════════════════════════════════════════
function getDB(){
  try{ return JSON.parse(localStorage.getItem(DB_KEY)||'null') || defaultDB(); }
  catch(e){ return defaultDB(); }
}
function saveDB(db){ localStorage.setItem(DB_KEY, JSON.stringify(db)); }
function defaultDB(){
  return {
    technicians:[
      {id:'t1',name:'Víctor Pinedo',pin:'1111'},{id:'t2',name:'Hebrahim Raies',pin:'2222'},
      {id:'t3',name:'Matías Bogado',pin:'3333'},{id:'t4',name:'Cristian Cáceres',pin:'4444'},
      {id:'t5',name:'Andrés Rocha',pin:'5555'},{id:'t6',name:'Antonio Tissero',pin:'6666'},
      {id:'t7',name:'Ricardo Castillo',pin:'7777'}
    ],
    orders:[]
  };
}
function getDrafts(){ try{ return JSON.parse(localStorage.getItem(DRAFT_KEY)||'{}'); } catch(e){ return {}; } }
function saveDrafts(d){ localStorage.setItem(DRAFT_KEY, JSON.stringify(d)); }
function getSentJornadas(){ try{ return JSON.parse(localStorage.getItem('agroterra_sent_v2')||'[]'); } catch(e){ return []; } }
function saveSentJornadas(arr){ localStorage.setItem('agroterra_sent_v2', JSON.stringify(arr)); }

// ═══════════════════════════════════════════
// API
// ═══════════════════════════════════════════
async function apiGet(action){
  const res = await fetch(API + '?action=' + action);
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  if(!json.ok) throw new Error(json.error || 'Error del servidor');
  return json.data;
}
async function apiPost(action, payload){
  const res = await fetch(API, { method:'POST', body: JSON.stringify({action, ...payload}) });
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  if(!json.ok) throw new Error(json.error || 'Error del servidor');
  return json.data;
}

async function syncOrders(){
  try {
    const data = await apiGet('getAll');
    const db = getDB();
    if(data.orders) db.orders = data.orders;
    if(data.technicians) db.technicians = data.technicians;
    saveDB(db);
    return db;
  } catch(e){
    console.warn('Sync failed:', e);
    return getDB();
  }
}

// ═══════════════════════════════════════════
// PIN
// ═══════════════════════════════════════════
let pinValue = '';
function initPinPad(){
  const pad = document.getElementById('pin-pad');
  pad.innerHTML = '';
  [1,2,3,4,5,6,7,8,9,'←',0,'OK'].forEach(k=>{
    const btn = document.createElement('button');
    btn.className = 'pin-btn' + (k==='←'?' del':k==='OK'?' enter':'');
    btn.textContent = k;
    btn.onclick = ()=>{
      if(k==='←'){ pinValue = pinValue.slice(0,-1); }
      else if(k==='OK'){ doLogin(); }
      else { if(pinValue.length<4) pinValue += k; }
      updatePinDisplay();
    };
    pad.appendChild(btn);
  });
}
function updatePinDisplay(){
  document.getElementById('pin-display').textContent = pinValue ? '•'.repeat(pinValue.length) : '—';
}

// ═══════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════
async function initLogin(){
  const db = getDB();
  const sel = document.getElementById('sel-tech');
  sel.innerHTML = '<option value="">— Seleccioná tu nombre —</option>';
  db.technicians.forEach(t=>{
    const o = document.createElement('option'); o.value = t.id; o.textContent = t.name; sel.appendChild(o);
  });
  // Try to sync techs from server in background
  try {
    const freshDB = await syncOrders();
    sel.innerHTML = '<option value="">— Seleccioná tu nombre —</option>';
    freshDB.technicians.forEach(t=>{
      const o = document.createElement('option'); o.value = t.id; o.textContent = t.name; sel.appendChild(o);
    });
  } catch(e){}
  initPinPad();
}

async function doLogin(){
  const techId = document.getElementById('sel-tech').value;
  const errEl  = document.getElementById('login-err');
  errEl.textContent = '';

  if(!techId){ errEl.textContent = 'Seleccioná tu nombre.'; return; }
  if(!pinValue){ errEl.textContent = 'Ingresá tu PIN.'; return; }

  const db = getDB();
  const tech = db.technicians.find(t=>t.id===techId&&t.pin===pinValue);
  if(!tech){ errEl.textContent = 'PIN incorrecto. Intentá de nuevo.'; pinValue=''; updatePinDisplay(); return; }

  currentTech = tech;
  const btn = document.getElementById('btn-ingresar');
  btn.textContent = 'Sincronizando...'; btn.disabled = true;

  // Sync orders from server
  await syncOrders();

  document.getElementById('scr-login').classList.remove('active');
  document.getElementById('scr-app').classList.add('active');
  currentDateOffset = 0;
  initApp();
  btn.textContent = 'Ingresar →'; btn.disabled = false;
}

function doLogout(){
  currentTech = null; pinValue = ''; currentDateOffset = 0;
  updatePinDisplay();
  document.getElementById('scr-app').classList.remove('active');
  document.getElementById('scr-login').classList.add('active');
  document.getElementById('login-err').textContent = '';
  document.getElementById('sel-tech').value = '';
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function getOffsetDate(offset){
  const d = new Date(); d.setDate(d.getDate()+offset);
  return d.toISOString().split('T')[0];
}
function TODAY(){ return new Date().toISOString().split('T')[0]; }
function toMin(t){ const[h,m]=t.split(':').map(Number); return h*60+m; }
function fromMin(m){ return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
function calcHours(desde, hasta){
  const s = toMin(desde), e = toMin(hasta);
  if(e<=s) return 0;
  const total = (e-s)/60;
  const regularEnd = toMin(REGULAR_LIMIT);
  const extra = Math.max(0,(e-regularEnd)/60);
  const regular = total-extra;
  return { total:+total.toFixed(2), regular:+regular.toFixed(2), extra:+extra.toFixed(2) };
}
function getOTDisplay(otId, db){
  if(otId==='__REFRIGERIO__') return '☕ Refrigerio';
  if(otId==='__IMPRODUCTIVA__') return '⏸ Improductiva';
  return db.orders.find(o=>o.id===otId)?.num || otId;
}
function tipoTagClass(tipo){ return {Productiva:'tag-prod',Improductiva:'tag-improd',Capacitación:'tag-cap',Viaje:'tag-viaje',Refrigerio:'tag-refrig'}[tipo]||''; }
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(type?' '+type:'');
  setTimeout(()=>{t.className='toast';},3000);
}

// ═══════════════════════════════════════════
// INIT APP
// ═══════════════════════════════════════════
function initApp(){
  document.getElementById('tb-name').textContent = currentTech.name;
  const today = new Date();
  document.getElementById('tb-date').textContent = today.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
  initTimeSelects();
  populateOTSelect();
  renderJornada();
  renderHistorial();
  renderOTTab();
  goTab('jornada');
}

function initTimeSelects(){
  const times = [];
  for(let m=toMin(JORNADA_START); m<=toMin(JORNADA_END); m+=30) times.push(fromMin(m));
  ['sel-desde','sel-hasta'].forEach((id,idx)=>{
    const sel = document.getElementById(id);
    sel.innerHTML = '';
    times.forEach(t=>{ const o=document.createElement('option'); o.value=t; o.textContent=t; sel.appendChild(o); });
    sel.value = idx===0 ? '07:00' : '17:00';
  });
  recalcHours();
}

function populateOTSelect(){
  const db = getDB();
  const sel = document.getElementById('sel-ot');
  const activeOrders = db.orders.filter(o=>o.status==='active');
  sel.innerHTML = '<option value="">— Seleccioná OT —</option>';
  activeOrders.forEach(o=>{
    const opt = document.createElement('option');
    opt.value = o.id;
    opt.textContent = o.num + ' — ' + (o.desc||'').substring(0,30);
    sel.appendChild(opt);
  });
  sel.appendChild(Object.assign(document.createElement('option'),{value:'__IMPRODUCTIVA__',textContent:'⏸ Improductiva / Sin OT'}));
  sel.appendChild(Object.assign(document.createElement('option'),{value:'__REFRIGERIO__',textContent:'☕ Refrigerio'}));
}

// ═══════════════════════════════════════════
// JORNADA RENDERING
// ═══════════════════════════════════════════
function navDay(delta){
  const newOffset = currentDateOffset + delta;
  if(newOffset > 0) return; // No puede ir al futuro
  currentDateOffset = newOffset;
  renderJornada();
}

function getJornada(dateStr){
  // Primero buscar en jornadas enviadas
  const sent = getSentJornadas().find(j=>j.techId===currentTech.id&&j.date===dateStr);
  if(sent) return sent;
  // Luego en borradores
  const drafts = getDrafts();
  const key = currentTech.id + '_' + dateStr;
  return drafts[key] || { techId:currentTech.id, date:dateStr, status:'draft', items:[] };
}

function saveCurrentDraft(){
  const dateStr = getOffsetDate(currentDateOffset);
  const key = currentTech.id + '_' + dateStr;
  const jornada = getJornada(dateStr);
  if(jornada.status==='sent') return; // No modificar enviadas
  const drafts = getDrafts();
  drafts[key] = jornada;
  saveDrafts(drafts);
}

function renderJornada(){
  const dateStr = getOffsetDate(currentDateOffset);
  const isToday = currentDateOffset === 0;
  const date = new Date(dateStr + 'T12:00:00');
  const dateLabel = date.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});

  document.getElementById('day-label').textContent = isToday ? 'Hoy' : dateLabel;
  document.getElementById('btn-manana').disabled = currentDateOffset >= 0;
  document.getElementById('jh-date').textContent = dateLabel;

  const jornada = getJornada(dateStr);
  const isSent = jornada.status === 'sent';

  document.getElementById('jh-detail').textContent = isSent ? ('Enviada el ' + (jornada.sentAt||'').substring(0,10)) : 'Borrador';
  document.getElementById('jh-status').innerHTML = isSent
    ? '<span class="status-badge sb-sent">✓ Enviada</span>'
    : '<span class="status-badge sb-draft">✎ Borrador</span>';

  // Mostrar/ocultar sección de agregar según si fue enviada
  document.getElementById('add-item-section').style.display = isSent ? 'none' : 'block';
  document.getElementById('send-section').style.display = isSent ? 'none' : 'block';

  // Totales
  const items = jornada.items || [];
  const totReg   = items.reduce((s,i)=>s+(parseFloat(i.horasRegulares)||parseFloat(i.horas)||0),0);
  const totExtra = items.reduce((s,i)=>s+(parseFloat(i.horasExtra)||0),0);
  const totTotal = items.reduce((s,i)=>s+(parseFloat(i.horas)||0),0);
  document.getElementById('tot-regular').textContent = totReg.toFixed(1)+'h';
  document.getElementById('tot-extra').textContent   = totExtra.toFixed(1)+'h';
  document.getElementById('tot-total').textContent   = totTotal.toFixed(1)+'h';

  // Items list
  const db = getDB();
  const listEl = document.getElementById('items-list');
  if(!items.length){
    listEl.innerHTML = `<div class="items-empty">${isSent?'Jornada enviada sin ítems.':'No agregaste bloques aún.\nUsá el formulario de abajo ↓'}</div>`;
    return;
  }
  listEl.innerHTML = items.map((item,idx)=>`
    <div class="item-card">
      <div class="item-top">
        <div>
          <div class="item-ot">${getOTDisplay(item.otId,db)}</div>
          <div style="margin-top:3px"><span class="item-tipo ${tipoTagClass(item.tipo)}">${item.tipo}</span>${(parseFloat(item.horasExtra)||0)>0?`<span class="item-extra-badge">+${parseFloat(item.horasExtra).toFixed(1)}h extra</span>`:''}</div>
          <div class="item-meta" style="margin-top:4px">${item.desde||'—'} → ${item.hasta||'—'}${item.obs?' · '+item.obs:''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <div class="item-hours">${(parseFloat(item.horas)||0).toFixed(1)}h</div>
          ${!isSent?`<button class="btn-del-item" onclick="deleteItem(${idx})">🗑</button>`:''}
        </div>
      </div>
    </div>`).join('');
}

function deleteItem(idx){
  const dateStr = getOffsetDate(currentDateOffset);
  const jornada = getJornada(dateStr);
  if(jornada.status==='sent') return;
  jornada.items.splice(idx,1);
  const drafts = getDrafts();
  drafts[currentTech.id+'_'+dateStr] = jornada;
  saveDrafts(drafts);
  renderJornada();
}

// ═══════════════════════════════════════════
// AGREGAR ITEM
// ═══════════════════════════════════════════
function onOTChange(){
  const val = document.getElementById('sel-ot').value;
  if(val==='__REFRIGERIO__'){
    document.getElementById('sel-tipo').value='Refrigerio';
    document.getElementById('sel-hasta').value='07:30';
  } else if(val==='__IMPRODUCTIVA__'){
    document.getElementById('sel-tipo').value='Improductiva';
  } else {
    document.getElementById('sel-tipo').value='Productiva';
  }
  onTipoChange();
  recalcHours();
}

function onTipoChange(){
  const tipo = document.getElementById('sel-tipo').value;
  document.getElementById('motivo-field').style.display = tipo==='Improductiva' ? 'block' : 'none';
}

function recalcHours(){
  const desde = document.getElementById('sel-desde').value;
  const hasta  = document.getElementById('sel-hasta').value;
  const prev   = document.getElementById('hours-preview');
  if(!desde||!hasta){ prev.style.display='none'; return; }
  const h = calcHours(desde, hasta);
  if(h.total<=0){ prev.style.display='none'; return; }
  prev.style.display='block';
  prev.textContent = h.total.toFixed(1)+'h' + (h.extra>0?` (${h.regular.toFixed(1)}h regular + ${h.extra.toFixed(1)}h extra)`:'');
}

function addItem(){
  const errEl  = document.getElementById('add-err');
  const btn    = document.getElementById('btn-add-item');
  errEl.textContent = '';

  const otId  = document.getElementById('sel-ot').value;
  const tipo  = document.getElementById('sel-tipo').value;
  const desde = document.getElementById('sel-desde').value;
  const hasta = document.getElementById('sel-hasta').value;
  const obs   = document.getElementById('inp-obs').value.trim();
  const motivo = document.getElementById('sel-motivo').value;

  if(!otId)   { errEl.textContent = 'Seleccioná una OT.'; return; }
  if(!desde||!hasta) { errEl.textContent = 'Completá el horario.'; return; }

  const h = calcHours(desde, hasta);
  if(h.total<=0){ errEl.textContent = 'El horario de entrada debe ser antes del de salida.'; return; }

  const dateStr = getOffsetDate(currentDateOffset);
  const jornada = getJornada(dateStr);
  if(jornada.status==='sent'){ errEl.textContent = 'Esta jornada ya fue enviada.'; return; }

  // Verificar solapamiento de horarios
  const newS = toMin(desde), newE = toMin(hasta);
  const overlap = (jornada.items||[]).some(i=>{
    if(!i.desde||!i.hasta) return false;
    const s=toMin(i.desde), e=toMin(i.hasta);
    return newS<e && newE>s;
  });
  if(overlap){ errEl.textContent = 'Ese horario se superpone con otro bloque ya agregado.'; return; }

  const item = {
    id: 'item_' + Date.now(),
    otId, tipo, desde, hasta, obs,
    motivo: tipo==='Improductiva'?motivo:'',
    horas: h.total,
    horasRegulares: h.regular,
    horasExtra: h.extra,
  };

  jornada.items = jornada.items || [];
  jornada.items.push(item);
  jornada.items.sort((a,b)=>toMin(a.desde)-toMin(b.desde));

  const drafts = getDrafts();
  drafts[currentTech.id+'_'+dateStr] = jornada;
  saveDrafts(drafts);

  // Limpiar obs y ajustar siguiente desde
  document.getElementById('inp-obs').value = '';
  document.getElementById('sel-desde').value = hasta;
  recalcHours();

  renderJornada();
  showToast('Bloque agregado ✓', 'success');
}

// ═══════════════════════════════════════════
// ENVIAR JORNADA
// ═══════════════════════════════════════════
async function sendJornada(){
  const dateStr = getOffsetDate(currentDateOffset);
  const jornada = getJornada(dateStr);
  if(!jornada.items||!jornada.items.length){ showToast('Agregá al menos un bloque antes de enviar.','error'); return; }
  if(jornada.status==='sent'){ showToast('Esta jornada ya fue enviada.','error'); return; }

  const btn = document.getElementById('btn-send');
  const btnTxt = document.getElementById('btn-send-txt');
  btn.disabled = true;
  btnTxt.innerHTML = '<span class="spinner"></span> Enviando...';

  try {
    jornada.status = 'sent';
    jornada.syncStatus = 'synced';
    jornada.sentAt = new Date().toISOString();

    await apiPost('saveJornada', { jornada });

    // Guardar como enviada
    const sent = getSentJornadas();
    const existIdx = sent.findIndex(j=>j.techId===currentTech.id&&j.date===dateStr);
    if(existIdx>=0) sent[existIdx] = jornada;
    else sent.push(jornada);
    saveSentJornadas(sent);

    // Borrar borrador
    const drafts = getDrafts();
    delete drafts[currentTech.id+'_'+dateStr];
    saveDrafts(drafts);

    showToast('Jornada enviada ✓', 'success');
    renderJornada();
    renderHistorial();

  } catch(e){
    jornada.status = 'draft';
    showToast('Error al enviar: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btnTxt.textContent = '📤 Enviar jornada';
  }
}

function saveDraft(){
  const dateStr = getOffsetDate(currentDateOffset);
  const jornada = getJornada(dateStr);
  if(jornada.status==='sent'){ showToast('Esta jornada ya fue enviada.','error'); return; }
  const drafts = getDrafts();
  drafts[currentTech.id+'_'+dateStr] = jornada;
  saveDrafts(drafts);
  showToast('Borrador guardado ✓', 'success');
}

// ═══════════════════════════════════════════
// HISTORIAL
// ═══════════════════════════════════════════
function renderHistorial(){
  const sent = getSentJornadas().filter(j=>j.techId===currentTech.id).sort((a,b)=>b.date.localeCompare(a.date));
  const db = getDB();
  const el = document.getElementById('hist-container');
  if(!sent.length){ el.innerHTML='<div style="padding:40px 20px;text-align:center;color:var(--text3);font-size:13px">No hay jornadas enviadas aún.</div>'; return; }
  el.innerHTML = sent.slice(0,30).map(j=>{
    const total = (j.items||[]).reduce((s,i)=>s+(parseFloat(i.horas)||0),0);
    const dateLabel = new Date(j.date+'T12:00:00').toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'});
    return `<div class="hist-day">
      <div class="hist-day-header"><span>${dateLabel}</span><span class="hist-day-total">${total.toFixed(1)}h</span></div>
      ${(j.items||[]).map(i=>`<div class="hist-item"><div class="hist-ot"><div style="font-size:14px;font-weight:700">${getOTDisplay(i.otId,db)}</div><div style="font-size:11px;color:var(--text2)">${i.tipo} · ${i.desde||'—'}→${i.hasta||'—'}</div></div><div class="hist-h">${(parseFloat(i.horas)||0).toFixed(1)}h</div></div>`).join('')}
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
// TAB OTs
// ═══════════════════════════════════════════
function renderOTTab(){
  const db = getDB();
  const el = document.getElementById('ot-tab-list');
  const activeOTs = db.orders.filter(o=>o.status==='active');
  if(!activeOTs.length){ el.innerHTML='<div style="padding:40px 20px;text-align:center;color:var(--text3);font-size:13px">No hay órdenes de trabajo activas.\nEl administrador debe crear una desde su panel.</div>'; return; }
  el.innerHTML = activeOTs.map(o=>`
    <div class="ot-list-item">
      <div class="ot-list-num">${o.num} <span class="ot-tag ot-active">Activa</span></div>
      <div class="ot-list-info">
        <div class="ot-list-desc">${o.desc||'—'}</div>
        <div class="ot-list-client">👤 ${o.client||'—'}${o.unidad?' · '+o.unidad:''}</div>
        ${o.ratePerHour?`<div style="font-size:11px;color:var(--cyan);margin-top:2px">USD ${o.ratePerHour}/h</div>`:''}
      </div>
    </div>`).join('');
}

// ═══════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════
function goTab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.getElementById('tc-'+name).classList.add('active');
  if(name==='historial') renderHistorial();
  if(name==='ordenes'){ syncOrders().then(()=>{ renderOTTab(); populateOTSelect(); }); }
}
